function Mdl({title,onClose,children,width=540}){

const Fld=({label,children})=><div style={{marginBottom:14}}>{label&&<label style={{fontSize:13,color:"#666",display:"block",marginBottom:4}}>{label}</label>}{children}</div>;

const Txa=({label,...p})=><Fld label={label}><textarea {...p}/></Fld>;
const Sel=({label,value,onChange,children})=><Fld label={label}><select value={value} onChange={onChange}>{children}</select></Fld>;
const Emp=({icon,text,sub})=><div style={{textAlign:"center",padding:"48px 24px",color:"#666"}}><div style={{fontSize:36,marginBottom:8}}>{icon}</div><div style={{fontWeight:500,marginBottom:4,color:"#1a1a1a"}}>{text}</div>{sub&&<div style={{fontSize:13}}>{sub}</div>}</div>;

const Cxl=({onClick})=><button onClick={onClick} style={{fontSize:13,padding:"8px 16px",borderRadius:8,border:"1px solid #ccc",cursor:"pointer",background:"#fff"}}>Odustani</button>;
const BtnRow=({children})=><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>{children}</div>;
const Row2=({children})=><div style={{display:"flex",gap:10,marginBottom:14}}>{children}</div>;
const Half=({label,children})=><div style={{flex:1}}>{label&&<label style={{fontSize:13,color:"#666",display:"block",marginBottom:4}}>{label}</label>}{children}</div>;

async function callAI(prompt,max=1000,apiKey=""){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},body:JSON.stringify({model:MODEL,max_tokens:max,messages:[{role:"user",content:prompt}]})});
  const j=await r.json();
  if(j.error)throw new Error(j.error.message);
  return j.content?.map(c=>c.text||"").join("")||"";
}
const parseJ=text=>JSON.parse(text.replace(/```json/g,"").replace(/```/g,"").trim());

    <div style={{background:"#fff",borderRadius:16,border:"1px solid #e0e0e0",padding:40,width:"100%",maxWidth:380,boxShadow:"0 4px 24px rgba(0,0,0,0.08)"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:36,marginBottom:8}}>📋</div>
        <h1 style={{fontSize:22,fontWeight:600,marginBottom:4}}>Project Manager</h1>
        <p style={{fontSize:13,color:"#666"}}>Prijavi se za nastavak</p>
      </div>
      <div style={{marginBottom:16}}>
        <label style={{fontSize:13,color:"#666",display:"block",marginBottom:4}}>Email</label>
        <input type="email" value={loginData.email} onChange={e=>setLoginData(d=>({...d,email:e.target.value}))} placeholder="email@primjer.com" onKeyDown={e=>e.key==="Enter"&&onLogin()} style={{width:"100%",padding:"10px 12px",fontSize:14,border:"1px solid #d0d0d0",borderRadius:8,outline:"none"}}/>
      </div>
      <div style={{marginBottom:24}}>
        <label style={{fontSize:13,color:"#666",display:"block",marginBottom:4}}>Lozinka</label>
        <input type="password" value={loginData.password} onChange={e=>setLoginData(d=>({...d,password:e.target.value}))} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&onLogin()} style={{width:"100%",padding:"10px 12px",fontSize:14,border:"1px solid #d0d0d0",borderRadius:8,outline:"none"}}/>
      </div>

function UsersTab(){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({email:"",password:"",role:"user"});
  const [err,setErr]=useState("");
  useEffect(()=>{jbGetUsers().then(d=>{if(d&&d.users)setUsers(d.users);setLoading(false);});});
  const addUser=async()=>{
    setErr("");
    if(!form.email||!form.password){setErr("Unesi email i lozinku.");return;}
    if(users.find(u=>u.email===form.email)){setErr("Korisnik već postoji.");return;}
    const nu=[...users,{...form,id:uid()}];
    await jbSetUsers({users:nu});setUsers(nu);setForm({email:"",password:"",role:"user"});setShowForm(false);
  };
  const delUser=async(email)=>{
    if(!confirm("Obrisati korisnika?"))return;
    const nu=users.filter(u=>u.email!==email);
    await jbSetUsers({users:nu});setUsers(nu);
  };
  if(loading)return <div style={{textAlign:"center",padding:40,color:"#666"}}>Učitavanje...</div>;
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div><b style={{fontSize:15}}>Upravljanje korisnicima</b><div style={{fontSize:13,color:"#666"}}>{users.length} korisnika</div></div>
      <button onClick={()=>setShowForm(true)}>+ Novi korisnik</button>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {users.map(u=><div key={u.email} style={{background:"#fff",border:"1px solid #e0e0e0",borderRadius:10,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:avc(u.email),display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:500,flexShrink:0}}>{u.email[0].toUpperCase()}</div>
        <div style={{flex:1}}><div style={{fontWeight:500,fontSize:14}}>{u.email}</div><div style={{fontSize:12,color:"#666"}}>{u.role==="admin"?"Administrator":"Korisnik"}</div></div>
        <Bdg color={u.role==="admin"?"#534AB7":"#0F6E56"}>{u.role==="admin"?"Admin":"Korisnik"}</Bdg>
        <button onClick={()=>delUser(u.email)} style={{fontSize:12,color:"#993C1D",padding:"4px 8px"}}>Obriši</button>
      </div>)}
    </div>
    {showForm&&<Mdl title="Novi korisnik" onClose={()=>{setShowForm(false);setErr("");}}>
      <div style={{marginBottom:14}}><label style={{fontSize:13,color:"#666",display:"block",marginBottom:4}}>Email</label><input value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="email@primjer.com"/></div>
      <div style={{marginBottom:14}}><label style={{fontSize:13,color:"#666",display:"block",marginBottom:4}}>Lozinka</label><input type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} placeholder="••••••••"/></div>
      <div style={{marginBottom:20}}><label style={{fontSize:13,color:"#666",display:"block",marginBottom:4}}>Uloga</label><select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}><option value="user">Korisnik</option><option value="admin">Administrator</option></select></div>
      {err&&<div style={{background:"#993C1D22",color:"#993C1D",fontSize:13,padding:"8px 12px",borderRadius:8,marginBottom:16}}>{err}</div>}
      <BtnRow><Cxl onClick={()=>{setShowForm(false);setErr("");}}/><Sav onClick={addUser} label="Dodaj korisnika"/></BtnRow>
    </Mdl>}
  </div>;
}

function App(){
  const [tab,setTab]=useState("templates");
  const [data,setData]=useState(INIT);
  const [apiKey,setApiKey]=useState("");
  const [showKey,setShowKey]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [user,setUser]=useState(null);
  const [loginErr,setLoginErr]=useState("");
  const [loginData,setLoginData]=useState({email:"",password:""});

  useEffect(()=>{
    const k=localStorage.getItem("pm_apikey")||"";setApiKey(k);
    const savedUser=localStorage.getItem("pm_user");
    if(savedUser)setUser(JSON.parse(savedUser));
  },[]);

  useEffect(()=>{
    if(!user)return;
    setSyncing(true);
    jbGet().then(d=>{
      if(d&&d.templates)setData(d);
      else{try{const s=localStorage.getItem("pmv5");if(s)setData(JSON.parse(s));}catch{}}
      setSyncing(false);setLastSync(new Date());
    });
    const iv=setInterval(()=>{jbGet().then(d=>{if(d&&d.templates){setData(d);setLastSync(new Date());}});},30000);
    return()=>clearInterval(iv);
  },[user]);

  const save=d=>{setData(d);try{localStorage.setItem("pmv5",JSON.stringify(d));}catch{}jbSet(d).then(()=>setLastSync(new Date()));};

  const login=async()=>{
    setLoginErr("");
    if(!loginData.email||!loginData.password){setLoginErr("Unesi email i lozinku.");return;}
    const users=await jbGetUsers();
    if(!users||!users.users){setLoginErr("Greška pri dohvatu korisnika.");return;}
    const found=users.users.find(u=>u.email===loginData.email&&u.password===loginData.password);
    if(!found){setLoginErr("Pogrešan email ili lozinka.");return;}
    setUser(found);localStorage.setItem("pm_user",JSON.stringify(found));
  };

  const logout=()=>{
    setUser(null);
    localStorage.removeItem("pm_user");
    localStorage.removeItem("pmv5");
    setData(INIT);
  };

  if(!user)return <LoginPage loginData={loginData} setLoginData={setLoginData} onLogin={login} error={loginErr}/>;

  const tabs=[
    {id:"templates",label:"📋 Template-i"},
    {id:"projects",label:"🗂 Projekti"},
    {id:"calendar",label:"📅 Kalendar"},
    {id:"modules",label:"🧩 Moduli"},
    {id:"employees",label:"👥 Djelatnici"},
    {id:"clients",label:"🏢 Klijenti"},
    {id:"guides",label:"📖 Upute"},
    ...(user.role==="admin"?[{id:"users",label:"👤 Korisnici"}]:[]),
  ];

  return <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
      <div>
        <h1 style={{fontSize:20,fontWeight:500,marginBottom:2}}>Project Template Manager</h1>
        <p style={{fontSize:13,color:"#666"}}>AI-podržano upravljanje projektima</p>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <span style={{fontSize:12,color:"#666"}}>👤 {user.email}</span>
        <button onClick={()=>setShowKey(true)} style={{fontSize:11,padding:"4px 10px",color:apiKey?"#0F6E56":"#993C1D",background:apiKey?"#0F6E5622":"#993C1D22",border:"none",borderRadius:6}}>{apiKey?"✓ API ključ":"⚠ API ključ"}</button>
        <button onClick={logout} style={{fontSize:11,padding:"4px 10px",color:"#993C1D",background:"#993C1D22",border:"none",borderRadius:6}}>Odjava</button>
      </div>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,fontSize:12,color:"#888"}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:syncing?"#BA7517":lastSync?"#0F6E56":"#ccc",display:"inline-block"}}/>
      {syncing?"Sinkronizacija...":lastSync?"Sinkronizirano: "+lastSync.toLocaleTimeString("hr"):"Nije spojeno"}
      <button onClick={()=>{setSyncing(true);jbGet().then(d=>{if(d&&d.templates)setData(d);setSyncing(false);setLastSync(new Date());});}} style={{fontSize:11,padding:"2px 8px"}}>↻ Osvježi</button>
    </div>
    {showKey&&<ApiKeyModal apiKey={apiKey} onSave={k=>{setApiKey(k);localStorage.setItem("pm_apikey",k);setShowKey(false);}} onClose={()=>setShowKey(false)}/>}
    <AppTabs tabs={tabs} active={tab} onChange={setTab}/>
    {tab==="templates"&&<TemplatesTab data={data} save={save} apiKey={apiKey}/>}
    {tab==="projects"&&<ProjectsTab data={data} save={save} apiKey={apiKey}/>}
    {tab==="calendar"&&<CalendarTab data={data} save={save}/>}
    {tab==="modules"&&<ModulesTab data={data} save={save}/>}
    {tab==="employees"&&<EmployeesTab data={data} save={save}/>}
    {tab==="clients"&&<ClientsTab data={data} save={save}/>}
    {tab==="guides"&&<GuidesTab data={data} save={save} apiKey={apiKey}/>}
    {tab==="users"&&user.role==="admin"&&<UsersTab/>}
  </div>;
}

function ApiKeyModal({apiKey,onSave,onClose}){
  const [k,setK]=useState(apiKey);
  return <Mdl title="Anthropic API ključ" onClose={onClose}>
    <p style={{fontSize:13,color:"#666",marginBottom:12}}>Unesi svoj Anthropic API ključ za AI funkcionalnosti.</p>
    <Inp label="API ključ (sk-ant-...)" value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-api03-..."/>
    <p style={{fontSize:12,color:"#888",marginBottom:16}}><a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:"#534AB7"}}>console.anthropic.com</a></p>
    <BtnRow><Cxl onClick={onClose}/><Sav onClick={()=>onSave(k)} label="Spremi ključ"/></BtnRow>
  </Mdl>;
}

function CalendarTab({data,save}){
  const today=new Date();
  const [cur,setCur]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const [frm,setFrm]=useState(null);
  const [sel,setSel]=useState(null);
  const events=data.events||[];
  const y=cur.getFullYear(),m=cur.getMonth();
  const fd=(new Date(y,m,1).getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate();
  const todayStr=today.toISOString().slice(0,10);
  const pad=n=>String(n).padStart(2,"0");
  const dStr=d=>y+"-"+pad(m+1)+"-"+pad(d);
  const evDay=d=>events.filter(e=>e.date===dStr(d)).sort((a,b)=>a.time.localeCompare(b.time));
  const isT=d=>dStr(d)===todayStr;
  const delEv=id=>save({...data,events:events.filter(e=>e.id!==id)});
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);while(cells.length%7!==0)cells.push(null);
  const newFrm=date=>({title:"",date,time:"09:00",category:"Sastanak",clientId:"",projectId:"",note:""});
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button onClick={()=>setCur(new Date(y,m-1,1))} style={{fontSize:16,padding:"3px 10px"}}>‹</button>
        <b style={{fontSize:16,minWidth:160,textAlign:"center"}}>{MONTHS[m]} {y}</b>
        <button onClick={()=>setCur(new Date(y,m+1,1))} style={{fontSize:16,padding:"3px 10px"}}>›</button>
        <button onClick={()=>setCur(new Date(today.getFullYear(),today.getMonth(),1))} style={{fontSize:12,padding:"4px 10px",color:"#534AB7",background:"#534AB722",border:"none",borderRadius:6}}>Danas</button>
      </div>
      <button onClick={()=>setFrm(newFrm(todayStr))} style={{background:"#534AB7",color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13}}>+ Novi event</button>
    </div>
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
      {EV_CATS.map(c=><div key={c} style={{display:"flex",alignItems:"center",gap:4,fontSize:11}}><span style={{width:8,height:8,borderRadius:"50%",background:CAT_COLOR[c],display:"inline-block"}}/>{c}</div>)}
    </div>
    <div style={{border:"1px solid #e0e0e0",borderRadius:10,overflow:"hidden",background:"#fff",marginBottom:20}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#f5f5f5",borderBottom:"1px solid #e0e0e0"}}>
        {WDAYS.map(d=><div key={d} style={{padding:"8px 0",textAlign:"center",fontSize:12,fontWeight:500,color:"#666"}}>{d}</div>)}
      </div>
      {Array.from({length:cells.length/7},(_,wi)=>
        <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:wi<cells.length/7-1?"1px solid #f0f0f0":"none"}}>
          {cells.slice(wi*7,wi*7+7).map((d,di)=>{
            const evs=d?evDay(d):[];

function ProjDocs({project,data,save}){

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:14,color:"#666"}}>{emps.length} djelatnika</span><button onClick={()=>setFrm({name:"",email:"",phone:"",role:""})}>+ Dodaj djelatnika</button></div>
    {emps.length===0?<Emp icon="👥" text="Nema djelatnika" sub="Dodaj djelatnike"/>:<div style={{display:"flex",flexDirection:"column",gap:8}}>{emps.map(e=><div key={e.id} style={{background:"#fff",border:"1px solid #e0e0e0",borderRadius:10,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}><Av name={e.name} size={40}/><div style={{flex:1}}><b style={{fontSize:14}}>{e.name}</b><div style={{fontSize:12,color:"#666"}}>{e.role}{e.email&&" · "+e.email}{e.phone&&" · "+e.phone}</div></div><Bdg color="#534AB7">{tc(e.id)+" zadataka"}</Bdg><button onClick={()=>del(e.id)} style={{fontSize:12,color:"#993C1D",padding:"4px 8px"}}>Obriši</button></div>)}</div>}
    {frm&&<Mdl title="Novi djelatnik" onClose={()=>setFrm(null)}><Inp label="Ime i prezime" value={frm.name} onChange={e=>setFrm(f=>({...f,name:e.target.value}))}/><Inp label="Email" value={frm.email} onChange={e=>setFrm(f=>({...f,email:e.target.value}))}/><Inp label="Telefon" value={frm.phone} onChange={e=>setFrm(f=>({...f,phone:e.target.value}))}/><Inp label="Uloga" value={frm.role} onChange={e=>setFrm(f=>({...f,role:e.target.value}))}/><BtnRow><Cxl onClick={()=>setFrm(null)}/><Sav onClick={()=>{if(!frm.name.trim())return;save({...data,employees:[...emps,{...frm,id:uid()}]});setFrm(null);}}/></BtnRow></Mdl>}
  </div>;
}

function ClientsTab({data,save}){
  const [showC,setShowC]=useState(false);const [showCt,setShowCt]=useState(null);const [cf,setCf]=useState({name:"",email:"",phone:"",address:""});const [ctf,setCtf]=useState({name:"",email:"",phone:"",role:""});const [exp,setExp]=useState(null);
  const cs=data.clients||[];
  const addC=()=>{if(!cf.name.trim())return;save({...data,clients:[...cs,{...cf,id:uid(),contacts:[]}]});setCf({name:"",email:"",phone:"",address:""});setShowC(false);};
  const addCt=cid=>{if(!ctf.name.trim())return;save({...data,clients:cs.map(c=>c.id!==cid?c:{...c,contacts:[...(c.contacts||[]),{...ctf,id:uid()}]})});setCtf({name:"",email:"",phone:"",role:""});setShowCt(null);};
  const delC=id=>{if(!confirm("Obrisati?"))return;save({...data,clients:cs.filter(c=>c.id!==id)});};
  const delCt=(cid,ctid)=>save({...data,clients:cs.map(c=>c.id!==cid?c:{...c,contacts:(c.contacts||[]).filter(ct=>ct.id!==ctid)})});
  const pc=cid=>(data.projects||[]).filter(p=>p.clientId===cid).length;
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:14,color:"#666"}}>{cs.length} klijenata</span><button onClick={()=>setShowC(true)}>+ Dodaj klijenta</button></div>
    {cs.length===0?<Emp icon="🏢" text="Nema klijenata" sub="Dodaj klijente"/>:<div style={{display:"flex",flexDirection:"column",gap:10}}>{cs.map(c=><div key={c.id} style={{background:"#fff",border:"1px solid #e0e0e0",borderRadius:10,overflow:"hidden"}}><div style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>setExp(exp===c.id?null:c.id)}><Av name={c.name} size={40}/><div style={{flex:1}}><b style={{fontSize:14}}>{c.name}</b><div style={{fontSize:12,color:"#666"}}>{c.email}{c.phone&&" · "+c.phone}</div></div><Bdg color="#0F6E56">{pc(c.id)+" proj."}</Bdg><Bdg color="#534AB7">{(c.contacts||[]).length+" kontakata"}</Bdg><button onClick={e=>{e.stopPropagation();delC(c.id);}} style={{fontSize:12,color:"#993C1D",padding:"4px 8px"}}>Obriši</button><span style={{color:"#666",fontSize:12}}>{exp===c.id?"▲":"▼"}</span></div>{exp===c.id&&<div style={{borderTop:"1px solid #f0f0f0",padding:"12px 14px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><b style={{fontSize:13}}>Kontakt osobe</b><button onClick={()=>setShowCt(c.id)} style={{fontSize:12}}>+ Dodaj kontakt</button></div>{(c.contacts||[]).length===0?<div style={{fontSize:13,color:"#666"}}>Nema kontakata</div>:(c.contacts||[]).map(ct=><div key={ct.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #f5f5f5"}}><Av name={ct.name} size={28}/><div style={{flex:1}}><b style={{fontSize:13}}>{ct.name}</b><div style={{fontSize:12,color:"#666"}}>{ct.role}{ct.email&&" · "+ct.email}{ct.phone&&" · "+ct.phone}</div></div><button onClick={()=>delCt(c.id,ct.id)} style={{fontSize:11,color:"#993C1D",padding:"2px 6px"}}>✕</button></div>)}</div>}</div>)}</div>}
    {showC&&<Mdl title="Novi klijent" onClose={()=>setShowC(false)}><Inp label="Naziv" value={cf.name} onChange={e=>setCf(f=>({...f,name:e.target.value}))}/><Inp label="Email" value={cf.email} onChange={e=>setCf(f=>({...f,email:e.target.value}))}/><Inp label="Telefon" value={cf.phone} onChange={e=>setCf(f=>({...f,phone:e.target.value}))}/><Inp label="Adresa" value={cf.address} onChange={e=>setCf(f=>({...f,address:e.target.value}))}/><BtnRow><Cxl onClick={()=>setShowC(false)}/><Sav onClick={addC}/></BtnRow></Mdl>}
    {showCt&&<Mdl title="Novi kontakt" onClose={()=>setShowCt(null)}><Inp label="Ime i prezime" value={ctf.name} onChange={e=>setCtf(f=>({...f,name:e.target.value}))}/><Inp label="Uloga" value={ctf.role} onChange={e=>setCtf(f=>({...f,role:e.target.value}))}/><Inp label="Email" value={ctf.email} onChange={e=>setCtf(f=>({...f,email:e.target.value}))}/><Inp label="Telefon" value={ctf.phone} onChange={e=>setCtf(f=>({...f,phone:e.target.value}))}/><BtnRow><Cxl onClick={()=>setShowCt(null)}/><Sav onClick={()=>addCt(showCt)}/></BtnRow></Mdl>}
  </div>;
}

function GuidesTab({data,save,apiKey}){
  const [am,setAm]=useState("Svi");const [frm,setFrm]=useState(null);const [det,setDet]=useState(null);const [aim,setAim]=useState("Template-i");const [aiL,setAiL]=useState(false);
  const gs=data.guides||[];const filtered=am==="Svi"?gs:gs.filter(g=>g.module===am);
  const del=id=>{if(!confirm("Obrisati?"))return;save({...data,guides:gs.filter(g=>g.id!==id)});};
  const genAI=async()=>{if(!apiKey){alert("Postavi API ključ.");return;}setAiL(true);try{const text=await callAI('Generiraj korisničku uputu na hrvatskom za modul "'+aim+'" u aplikaciji za upravljanje projektima. Vrati SAMO JSON:\n{"title":"naziv","summary":"sažetak","steps":["korak 1","korak 2","korak 3"],"tips":["savjet 1"]}',800,apiKey);const g=parseJ(text);g.id=uid();g.module=aim;g.createdAt=new Date().toISOString();save({...data,guides:[...gs,g]});}catch(e){alert("Greška: "+e.message);}setAiL(false);};
  return <div>
    <div style={{background:"#f5f5f5",borderRadius:10,padding:16,marginBottom:20,border:"1px solid #e0e0e0"}}><div style={{fontSize:13,fontWeight:500,marginBottom:8}}>✨ AI generiranje upute</div><div style={{display:"flex",gap:8}}><select value={aim} onChange={e=>setAim(e.target.value)}>{GMODS.map(m=><option key={m} value={m}>{m}</option>)}</select><button onClick={genAI} disabled={aiL} style={{background:"#534AB7",color:"#fff",border:"none",borderRadius:8,padding:"0 16px",cursor:"pointer",fontSize:13,whiteSpace:"nowrap"}}>{aiL?"...":"Generiraj"}</button></div></div>
    <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4,alignItems:"center"}}>{["Svi",...GMODS].map(m=><button key={m} onClick={()=>setAm(m)} style={{whiteSpace:"nowrap",padding:"5px 12px",borderRadius:16,border:"1px solid",borderColor:am===m?"#534AB7":"#d0d0d0",background:am===m?"#534AB722":"none",color:am===m?"#534AB7":"#666",cursor:"pointer",fontSize:12}}>{m}{m!=="Svi"&&" ("+gs.filter(g=>g.module===m).length+")"}</button>)}<button onClick={()=>setFrm({title:"",module:"Općenito",summary:"",steps:"",tips:""})} style={{marginLeft:"auto",fontSize:12,whiteSpace:"nowrap"}}>+ Nova uputa</button></div>
    {filtered.length===0?<Emp icon="📖" text="Nema uputa" sub="Generiraj AI uputom ili dodaj ručno"/>:<div style={{display:"flex",flexDirection:"column",gap:10}}>{filtered.map(g=><div key={g.id} style={{background:"#fff",border:"1px solid #e0e0e0",borderRadius:10,padding:"14px 16px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}><div style={{flex:1}}><div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}><b style={{fontSize:15}}>{g.title}</b><Bdg color="#534AB7">{g.module}</Bdg></div><div style={{fontSize:13,color:"#666",marginBottom:6}}>{g.summary}</div><div style={{fontSize:12,color:"#666"}}>{(g.steps||[]).length+" koraka"}{(g.tips||[]).length>0&&" · "+(g.tips||[]).length+" savjeta"}</div></div><div style={{display:"flex",gap:6,flexShrink:0}}><button onClick={()=>setDet(g)} style={{fontSize:12,padding:"4px 10px"}}>Otvori</button><button onClick={()=>setFrm({...g,steps:(g.steps||[]).join("\n"),tips:(g.tips||[]).join("\n")})} style={{fontSize:12,padding:"4px 10px"}}>Uredi</button><button onClick={()=>del(g.id)} style={{fontSize:12,padding:"4px 10px",color:"#993C1D"}}>Obriši</button></div></div></div>)}</div>}
    {frm&&<Mdl title={frm.id?"Uredi uputu":"Nova uputa"} onClose={()=>setFrm(null)} width={560}><Inp label="Naslov" value={frm.title} onChange={e=>setFrm(f=>({...f,title:e.target.value}))}/><Fld label="Modul"><select value={frm.module} onChange={e=>setFrm(f=>({...f,module:e.target.value}))}>{GMODS.map(m=><option key={m} value={m}>{m}</option>)}</select></Fld><Txa label="Kratki sažetak" value={frm.summary} onChange={e=>setFrm(f=>({...f,summary:e.target.value}))} style={{minHeight:60}}/><Txa label="Koraci (jedan po redu)" value={frm.steps} onChange={e=>setFrm(f=>({...f,steps:e.target.value}))} style={{minHeight:100}}/><Txa label="Savjeti (jedan po redu)" value={frm.tips} onChange={e=>setFrm(f=>({...f,tips:e.target.value}))} style={{minHeight:60}}/><BtnRow><Cxl onClick={()=>setFrm(null)}/><Sav onClick={()=>{if(!frm.title.trim())return;const g={...frm,id:frm.id||uid(),steps:frm.steps.split("\n").filter(x=>x.trim()),tips:frm.tips.split("\n").filter(x=>x.trim()),createdAt:frm.createdAt||new Date().toISOString()};const gs2=data.guides||[];save({...data,guides:frm.id?gs2.map(x=>x.id===g.id?g:x):[...gs2,g]});setFrm(null);}}/></BtnRow></Mdl>}
    {det&&<Mdl title={det.title} onClose={()=>setDet(null)} width={560}><div style={{marginBottom:12}}><Bdg color="#534AB7">{det.module}</Bdg></div><p style={{fontSize:13,color:"#666",marginBottom:20}}>{det.summary}</p><div style={{marginBottom:20}}><b style={{fontSize:14,display:"block",marginBottom:10}}>Koraci</b>{(det.steps||[]).map((step,i)=><div key={i} style={{display:"flex",gap:12,marginBottom:10}}><div style={{width:24,height:24,borderRadius:"50%",background:"#534AB722",color:"#534AB7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:500,flexShrink:0}}>{i+1}</div><div style={{fontSize:13,paddingTop:3,lineHeight:1.6}}>{step}</div></div>)}</div>{(det.tips||[]).length>0&&<div style={{background:"#BA751722",borderRadius:8,padding:14}}><b style={{fontSize:13,color:"#BA7517",display:"block",marginBottom:8}}>💡 Savjeti</b>{det.tips.map((t,i)=><div key={i} style={{fontSize:13,marginBottom:4}}>• {t}</div>)}</div>}</Mdl>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
